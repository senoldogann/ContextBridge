version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
      time: "07:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - rust

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      time: "07:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - javascript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "07:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - ci
