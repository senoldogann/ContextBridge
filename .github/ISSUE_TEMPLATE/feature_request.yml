name: Feature Request
description: Suggest a new feature for ContextBridge
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature! Please describe your idea below.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Context Engine
        - Output Formatters
        - MCP Server
        - UI/UX
        - Performance
        - Documentation
        - Other
